<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        
        <div class="container">
            
            <div id="home-container">
                <h3>HOME</h3>
                    <div class="score-container">
                        <p id="homeScore"> 0 </p>
                    </div>         
                    <div class="buttons">
                        <button id="home-plus-one"> +1 </button>
                        <button id="home-plus-two"> +2 </button>
                        <button id="home-plus-three"> +3 </button>
                    </div>       
            </div>    
            
            <div id="guest-container">
                <h3>GUEST</h3>
                    <div class="score-container">
                        <p id="guestScore"> 0 </p>
                    </div>
                    <div class="buttons">
                        <button id="guest-plus-one"> +1 </button>
                        <button id="guest-plus-two"> +2 </button>
                        <button id="guest-plus-three"> +3 </button>
                    </div>
            </div>
            
        </div>
        
        <div id="reset-btn">
            <button id="reset-button"> Reset </button>
        </div>
        
        <script type="module" src="index.js"></script>
    </body>
</html>
